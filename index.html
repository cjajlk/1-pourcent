<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="screen-orientation" content="portrait">
    <title>The 1% Club - Pro Edition</title>
    <style>
        body {
            overscroll-behavior: none;
        }
        @media screen and (orientation: landscape) {
            body::before {
                content: 'Veuillez tourner votre appareil en mode portrait.';
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: #111;
                color: #ffd700;
                font-size: 2rem;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }
            #app, #modal { display: none !important; }
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', Arial, sans-serif;
            background: linear-gradient(135deg, #000 0%, #232526 100%);
            overflow: hidden;
        }
        .fade {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(.77,0,.18,1);
        }
        .fade.show {
            opacity: 1;
            pointer-events: auto;
        }
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .metal-disc {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle at 60% 40%, #e6e6e6 0%, #b3b3b3 40%, #444 100%);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 1px 0 #fff inset, 0 0 24px #ffd70099;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            transition: box-shadow 0.05s, transform 0.05s;
            border: 2.5px solid #ffd700;
            position: relative;
            box-shadow: 0 0 24px #ffd70099, 0 8px 32px rgba(0,0,0,0.25);
        }
        .metal-disc.pressed {
            box-shadow: 0 0 32px #ffd700cc, 0 2px 8px rgba(0,0,0,0.18), 0 1px 0 #fff inset;
            transform: scale(0.97);
        }
        .floating-text {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            color: #ffd700;
            font-weight: bold;
            pointer-events: none;
            opacity: 0.95;
            filter: drop-shadow(0 2px 8px #ffd70088);
            animation: floatUp 1s cubic-bezier(.77,0,.18,1) forwards;
        }
        .floating-plus {
            position: absolute;
            left: 60%;
            top: 60%;
            font-size: 1.2rem;
            color: #ffd700;
            font-weight: bold;
            pointer-events: none;
            opacity: 0.95;
            filter: drop-shadow(0 2px 8px #ffd70088);
            animation: floatUpPlus 0.8s cubic-bezier(.77,0,.18,1) forwards;
        }
        @keyframes floatUpPlus {
            0% { opacity: 0.95; transform: translate(-50%, -50%) scale(1); }
            60% { opacity: 0.85; transform: translate(-50%, -80%) scale(1.15); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(1.2); }
        }
        @keyframes floatUp {
            0% { opacity: 0.95; transform: translate(-50%, -50%) scale(1); }
            60% { opacity: 0.85; transform: translate(-50%, -80%) scale(1.15); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(1.2); }
        }
        .glass-modal {
            position: fixed;
            left: 50%;
            bottom: -100%;
            transform: translateX(-50%);
            min-width: 320px;
            max-width: 90vw;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(18px);
            border: 2px solid #ffd700;
            border-radius: 18px;
            box-shadow: 0 0 32px #ffd700cc, 0 8px 32px rgba(0,0,0,0.18);
            padding: 32px 24px 24px 24px;
            z-index: 100;
            transition: bottom 0.6s cubic-bezier(.77,0,.18,1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .glass-modal.show {
            bottom: 8vh;
        }
        .modal-title {
            font-size: 2rem;
            color: #ffd700;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.04em;
            text-shadow: 0 2px 8px #ffd70044;
        }
        .modal-msg {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 500;
            text-shadow: 0 2px 8px #00000033;
        }
        .pulse-btn {
            background: linear-gradient(90deg, #ffd700 0%, #fffbe6 100%);
            color: #232526;
            font-weight: bold;
            border: none;
            border-radius: 18px;
            font-size: 1.4rem;
            padding: 24px 0;
            width: 90vw;
            max-width: 420px;
            margin: 0 auto 8px auto;
            cursor: pointer;
            box-shadow: 0 0 32px #ffd700cc, 0 2px 8px #ffd70044;
            animation: pulse 1.2s infinite;
            transition: background 0.2s;
            touch-action: manipulation;
            display: block;
        }
        @keyframes pulse {
            0% { box-shadow: 0 2px 8px #ffd70044; }
            50% { box-shadow: 0 2px 24px #ffd70088; }
            100% { box-shadow: 0 2px 8px #ffd70044; }
        }
        .share-btn {
            background: linear-gradient(90deg, #ffd700 0%, #fffbe6 100%);
            color: #232526;
            font-weight: bold;
            border: none;
            border-radius: 18px;
            font-size: 1.2rem;
            padding: 18px 0;
            width: 90vw;
            max-width: 420px;
            margin: 24px auto 0 auto;
            cursor: pointer;
            box-shadow: 0 0 32px #ffd700cc, 0 2px 8px #ffd70044;
            transition: background 0.2s;
            touch-action: manipulation;
            display: block;
        }
        .member-card {
            width: 340px;
            height: 180px;
            background: linear-gradient(135deg, #ffd700 0%, #fffbe6 100%);
            border-radius: 18px;
            box-shadow: 0 0 32px #ffd700cc, 0 8px 32px #ffd70044;
            border: 2.5px solid #ffd700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #232526;
            font-weight: bold;
            margin: 32px auto 0 auto;
            perspective: 800px;
            transition: transform 0.2s cubic-bezier(.77,0,.18,1);
            will-change: transform;
        }
        .member-card-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            transition: transform 0.2s cubic-bezier(.77,0,.18,1);
        }
        .member-card-title {
            font-size: 2rem;
            color: #ffd700;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px #ffd70044;
        }
        .member-card-score {
            font-size: 1.2rem;
            color: #232526;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .member-card-id {
            font-size: 1rem;
            color: #232526;
            opacity: 0.7;
            margin-top: 8px;
        }
        .elite-logo {
            font-size: 2.8rem;
            color: #ffd700;
            text-shadow: 0 2px 8px #ffd70044;
            margin-bottom: 18px;
            letter-spacing: 0.08em;
            font-weight: 900;
            text-align: center;
        }
        .desc {
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 32px;
            text-shadow: 0 2px 8px #00000033;
        }
        @media (max-width: 600px) {
            .metal-disc {
                width: 90vw;
                height: 90vw;
                min-width: 180px;
                min-height: 180px;
            }
            .member-card {
                width: 90vw;
                height: 120px;
            }
            .pulse-btn, .share-btn {
                width: 90vw;
                font-size: 1.2rem;
                padding: 18px 0;
            }
        }
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 8px;
            background: rgba(255,255,255,0.08);
            z-index: 99;
        }
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700 0%, #fffbe6 100%);
            box-shadow: 0 0 16px #ffd700cc;
            border-radius: 0 8px 8px 0;
            transition: width 0.1s linear;
        }
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
        }
        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #ffd700 0%, #fffbe6 100%);
            border-radius: 50%;
            box-shadow: 0 0 16px #ffd700cc;
            opacity: 0.85;
            animation: confetti-fall 1.8s cubic-bezier(.77,0,.18,1) forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-40px) scale(1) rotate(0deg); opacity: 0.85; }
            80% { opacity: 0.85; }
            100% { transform: translateY(100vh) scale(1.2) rotate(360deg); opacity: 0; }
        }
        .red-flash {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255,0,0,0.85);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #fff;
            font-weight: bold;
            animation: flashRed 0.7s cubic-bezier(.77,0,.18,1) forwards;
        }
        @keyframes flashRed {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="modal" class="glass-modal"></div>
    <script>
        // --- Data Architecture ---
        const defaultPlayer = {
            status: 'visitor',
            best_score: 0,
            total_attempts: 0,
            streak: 0
        };
        function getPlayer() {
            let p = localStorage.getItem('cj_player');
            if (!p) {
                localStorage.setItem('cj_player', JSON.stringify(defaultPlayer));
                return {...defaultPlayer};
            }
            return JSON.parse(p);
        }
        function setPlayer(obj) {
            localStorage.setItem('cj_player', JSON.stringify(obj));
        }
        function exportPlayer() {
            return JSON.parse(localStorage.getItem('cj_player'));
        }

        // --- UI State ---
        const app = document.getElementById('app');
        const modal = document.getElementById('modal');
        let currentView = 'home';
        let animating = false;

        // --- Web Animations Helper ---
        function fadeTransition(nextView) {
            if (animating) return;
            animating = true;
            app.classList.add('fade');
            setTimeout(() => {
                app.classList.remove('fade');
                renderView(nextView);
                animating = false;
            }, 600);
        }

        // --- Modal ---
        function showModal(title, msg, actions = []) {
            modal.innerHTML = `
                <div class="modal-title">${title}</div>
                <div class="modal-msg">${msg}</div>
                ${actions.map(a => `<button class="pulse-btn" onclick="${a.action}">${a.label}</button>`).join('')}
            `;
            modal.classList.add('show');
            setTimeout(() => {
                modal.classList.remove('show');
            }, 4200);
        }

        // --- Member Card ---
        function renderMemberCard(player) {
            app.innerHTML = `
                <div class="elite-logo">👑 The 1% Club</div>
                <div class="member-card" id="memberCard">
                    <div class="member-card-content">
                        <div class="member-card-title">Carte de Membre</div>
                        <div class="member-card-score">Score : ${player.best_score} / 50</div>
                        <div class="member-card-id">ID : CJ-${Math.floor(Math.random()*100000)}</div>
                    </div>
                </div>
                <button class="share-btn" onclick="shareRank()">Partager le rang</button>
            `;
            // 3D Card Animation
            const card = document.getElementById('memberCard');
            const content = card.querySelector('.member-card-content');
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const rotateY = (x / rect.width - 0.5) * 18;
                const rotateX = (y / rect.height - 0.5) * -18;
                content.style.transform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;
            });
            card.addEventListener('mouseleave', () => {
                content.style.transform = 'rotateY(0deg) rotateX(0deg)';
            });
            // Gyroscope (mobile)
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', e => {
                    const rotateY = (e.gamma || 0) / 2;
                    const rotateX = (e.beta || 0) / 2 - 10;
                    content.style.transform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;
                });
            }
        }

        // --- Share ---
        window.shareRank = function() {
            const player = getPlayer();
            const text = `👑 J'ai rejoint le 1% Club en ${player.total_attempts} essais ! Battez mon record ici : https://github.com/cedricbonhomme/the-1-percent-club`;
            navigator.clipboard.writeText(text).then(() => {
                showModal('Rang copié !', 'Prêt à briller sur les réseaux.');
            });
        };

        // --- Game Logic ---
        function renderGame() {
            app.innerHTML = `
                <div class="progress-bar"><div class="progress" id="progress"></div></div>
                <div class="center">
                    <div class="metal-disc" id="disc">
                        <span id="tapCount" style="font-size:2.2rem;color:#ffd700;font-weight:bold;">0</span>
                    </div>
                    <div style="margin-top:32px;text-align:center;color:#fff;font-size:1.1rem;">50 taps en 10 secondes.<br><span style="color:#ffd700;font-weight:600;">Frame-perfect challenge.</span></div>
                </div>
            `;
            let taps = 0;
            let start = null;
            let timer = null;
            let progressAnim = null;
            const disc = document.getElementById('disc');
            const tapCount = document.getElementById('tapCount');
            const progress = document.getElementById('progress');
            // Screen shake
            function screenShake() {
                document.body.style.transition = 'transform 0.12s';
                document.body.style.transform = 'translateX(' + (Math.random()*8-4) + 'px) translateY(' + (Math.random()*8-4) + 'px)';
                setTimeout(() => {
                    document.body.style.transform = '';
                }, 120);
            }
            // Progress bar
            function animateProgress() {
                let startTime = Date.now();
                function step() {
                    if (!start) return;
                    let elapsed = Date.now() - startTime;
                    let percent = Math.max(0, 1 - elapsed/10000);
                    progress.style.width = (percent*100) + 'vw';
                    if (percent > 0) {
                        progressAnim = requestAnimationFrame(step);
                    }
                }
                step();
            }
            disc.addEventListener('pointerdown', e => {
                e.preventDefault();
                if (!start) {
                    start = Date.now();
                    timer = setTimeout(endGame, 10000);
                    animateProgress();
                }
                if (taps < 50) {
                    taps++;
                    tapCount.textContent = taps;
                    disc.classList.add('pressed');
                    setTimeout(() => disc.classList.remove('pressed'), 50);
                    // Floating Text
                    const float = document.createElement('div');
                    float.className = 'floating-text';
                    float.textContent = taps;
                    disc.appendChild(float);
                    setTimeout(() => float.remove(), 1000);
                    // Floating +1
                    const plus = document.createElement('div');
                    plus.className = 'floating-plus';
                    plus.textContent = '+1';
                    disc.appendChild(plus);
                    setTimeout(() => plus.remove(), 800);
                    // Screen shake
                    screenShake();
                }
                if (taps === 50) {
                    clearTimeout(timer);
                    endGame();
                }
            });
            function endGame() {
                disc.classList.remove('pressed');
                if (progressAnim) cancelAnimationFrame(progressAnim);
                progress.style.width = '0vw';
                const elapsed = start ? (Date.now() - start) / 1000 : 10;
                const player = getPlayer();
                player.total_attempts++;
                if (taps > player.best_score) {
                    player.best_score = taps;
                }
                if (taps === 50 && elapsed <= 10) {
                    player.status = 'member';
                    player.streak++;
                } else {
                    player.streak = 0;
                }
                setPlayer(player);
                // Provocation
                let msg = '';
                if (taps < 10) msg = 'Indigne du Club.';
                else if (taps >= 45 && taps < 50) msg = "L'échec à la porte du paradis.";
                else if (taps === 50 && elapsed <= 10) msg = 'Bienvenue dans le Club 👑!';
                else msg = `Score : ${taps} / 50`;
                // Red flash if time out
                if (taps < 50 && elapsed >= 10) {
                    const provos = [
                        'Trop lent !',
                        'Même mon grand-père fait mieux.',
                        'Le 1% n\'est pas pour vous.',
                        'Réessayez quand vous aurez des doigts.'
                    ];
                    const provomsg = provos[Math.floor(Math.random()*provos.length)];
                    const flash = document.createElement('div');
                    flash.className = 'red-flash';
                    flash.textContent = provomsg;
                    document.body.appendChild(flash);
                    setTimeout(() => flash.remove(), 700);
                    showModal('Résultat', provomsg, [{label:'Réessayer', action:'fadeTransition(\'game\')'}]);
                    setTimeout(() => fadeTransition('home'), 4200);
                    return;
                }
                // Confetti if 50/50
                if (taps === 50 && elapsed <= 10) {
                    confettiRain();
                    showModal('Bravo !', 'Bienvenue dans le Club 👑!', [{label:'Partager mon rang', action:'shareRank()'}]);
                    setTimeout(() => fadeTransition('member'), 4200);
                    return;
                }
                showModal('Résultat', msg, [{label:'Réessayer', action:'fadeTransition(\'game\')'}]);
                setTimeout(() => {
                    if (player.status === 'member') {
                        fadeTransition('member');
                    } else {
                        fadeTransition('home');
                    }
                }, 4200);
            }
            // Confetti
            function confettiRain() {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                for (let i=0; i<48; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random()*100 + 'vw';
                    piece.style.top = Math.random()*-40 + 'px';
                    piece.style.background = 'linear-gradient(135deg, #ffd700 0%, #fffbe6 100%)';
                    confetti.appendChild(piece);
                }
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 1800);
            }
        }

        // --- Home ---
        function renderHome() {
            const player = getPlayer();
            app.innerHTML = `
                <div class="elite-logo">👑 The 1% Club</div>
                <div class="desc">Défi : 50 taps en 10 secondes.<br>Seuls les meilleurs entrent.<br><span style="color:#ffd700;font-weight:600;">Pro Edition</span></div>
                <button class="pulse-btn" onclick="fadeTransition('game')">Jouer</button>
                <div style="margin-top:32px;color:#fff;font-size:1rem;text-align:center;">Meilleur score : <span style="color:#ffd700;font-weight:600;">${player.best_score}</span> / 50<br>Tentatives : <span style="color:#ffd700;font-weight:600;">${player.total_attempts}</span></div>
            `;
        }

        // --- View Router ---
        function renderView(view) {
            currentView = view;
            modal.classList.remove('show');
            if (view === 'home') renderHome();
            else if (view === 'game') renderGame();
            else if (view === 'member') renderMemberCard(getPlayer());
        }

        // --- Init ---
        renderView('home');
    </script>
</html>
